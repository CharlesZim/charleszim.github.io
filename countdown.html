<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.3.1/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.countdown/2.2.0/jquery.countdown.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.3.1/css/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Dosis&amp;display=swap" /> 
  </head>
  <body>
<div class="cont">
  <div class="rounded bg-gradient-1 text-white shadow p-5 text-center">
    <p class="text-uppercase">Le retour de <3</p>
    <div class="countdown pt-4" id="time"></div>
  </div>
</div>
</div>

<style>

body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  overflow-y: hidden;
  font-family: "Dosis", sans-serif;
  min-height: 100vh;
  font-size: 25px;
}

.countdown {
  text-transform: uppercase;
  font-weight: bold;
  span {
    text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
    font-size: 50px;
  }
  }


p{
  font-size: 50px !important;
}

.countdown-circles {
  text-transform: uppercase;
  font-weight: bold;
  span {
    width: 100px;
    height: 100px;
    border-radius: 0%;
    background: rgba(255, 255, 255, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
    &:first-of-type {
      margin-left: 0;
    }
  }
}
.bg-gradient-1 {
  overflow-y: hidden;
  background: #7f7fd5;
  width: 100vw;
  height: 100vh;

  background: -webkit-linear-gradient(to right, #7f7fd5, #86a8e7, #91eae4);
  background: linear-gradient(to right, #7f7fd5, #86a8e7, #91eae4);
}

.bg-gradient-1 p{
  margin-top: 30vh;
}
.bg-gradient-2 {
  background: #ff416c;
  background: -webkit-linear-gradient(to right, #ff416c, #ff4b2b);
  background: linear-gradient(to right, #ff416c, #ff4b2b);
}

span{
    margin-left: 10px;
}
.h1{
    font-size: 5em;
}

.h1>span{
    font-size: 4em !important;
}
</style>
  </body>
</html>

<script>
$("#time")
  .countdown("2023/1/9")
  .on("update.countdown", function (event) {
    var $this = $(this).html(
      event.strftime(
        "" +
          '<span class="h1 font-weight-bold">%D</span> Day%!d' +
          '<span class="h1 font-weight-bold">%H</span> Hr' +
          '<span class="h1 font-weight-bold">%M</span> Min' +
          '<span class="h1 font-weight-bold">%S</span> Sec'
      )
    );
  });


</script>
